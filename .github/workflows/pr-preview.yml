name: Deploy PR preview

# Builds a preview of each pull request and publishes it to
#   https://qirh.github.io/spider-man-game/pr-preview/pr-<number>/
# A comment is added to the PR with the preview URL.
# The preview is removed automatically when the PR is closed/merged.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Stage site (exclude repo metadata)
        if: github.event.action != 'closed'
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'tests' \
            --exclude 'node_modules' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude '_site' \
            ./ _site/

      - name: Deploy / cleanup preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
